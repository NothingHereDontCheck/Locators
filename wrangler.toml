name = "locators"
main = "src/index.ts"
compatibility_date = "2026-04-11"

[vars]
NOTIFY_EMAIL = "j_rainey@outlook.com"
# Optional: after verifying a domain in Resend, set a custom from:
# RESEND_FROM = "Metro Locators <hello@yourdomain.com>"

[assets]
directory = "./public"

{
  "observability": {
    "enabled": false,
    "head_sampling_rate": 1,
    "logs": {
      "enabled": true,
      "head_sampling_rate": 1,
      "persist": true,
      "invocation_logs": true
    },
    "traces": {
      "enabled": false,
      "persist": true,
      "head_sampling_rate": 1
    }
  }
}
